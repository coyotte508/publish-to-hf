name: Publish to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write  # required so the job can request an OIDC token from GitHub
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install the hf CLI
        run: |
          curl -LsSf https://hf.co/cli/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Upload model/ to the Hub
        env:
          # The HF repo to publish to. For non-model repos, prefix accordingly:
          #   datasets/acme/awesome-dataset, spaces/acme/awesome-space, kernels/acme/awesome-kernel
          # On GitHub Actions, the hf CLI detects the provider, exchanges the
          # OIDC token for a Hub token scoped to this resource, and uses it
          # automatically.
          HF_OIDC_RESOURCE: coyotte508/published-from-github
        run: |
          hf upload coyotte508/published-from-github ./model . \
            --commit-message "Publish from ${GITHUB_SHA::7}"
