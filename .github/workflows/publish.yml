name: Publish to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write  # required so the job can request an OIDC token from GitHub
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install --upgrade "huggingface_hub>=1.16.1"

      - name: Exchange GitHub OIDC token for a Hub token
        id: hf-auth
        run: |
          set -euo pipefail

          # The HF repo to publish to. For non-model repos, prefix accordingly:
          #   datasets/acme/awesome-dataset, spaces/acme/awesome-space, kernels/acme/awesome-kernel
          RESOURCE="coyotte508/published-from-github"

          ID_TOKEN=$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://huggingface.co" \
            | jq -r .value)

          HEADERS_FILE=$(mktemp)
          BODY_FILE=$(mktemp)
          STATUS=$(curl -sS -D "$HEADERS_FILE" -o "$BODY_FILE" -w '%{http_code}' \
            -X POST "https://huggingface.co/oauth/token" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg t "$ID_TOKEN" --arg r "$RESOURCE" \
                  '{
                    grant_type:         "urn:ietf:params:oauth:grant-type:token-exchange",
                    subject_token_type: "urn:ietf:params:oauth:token-type:id_token",
                    subject_token:      $t,
                    resource:           $r
                  }')")

          if [ "$STATUS" -ne 200 ]; then
            REQUEST_ID=$(grep -i '^x-request-id:' "$HEADERS_FILE" | sed 's/.*: *//' | tr -d '\r')
            echo "::error::Token exchange failed with HTTP $STATUS (x-request-id: ${REQUEST_ID:-unknown})"
            cat "$BODY_FILE"
            exit 1
          fi

          HF_TOKEN=$(jq -r .access_token "$BODY_FILE")
          echo "::add-mask::$HF_TOKEN"
          # Safe way to write to env/outputs
          DELIM="EOF_$(openssl rand -hex 16)"
          {
            echo "token<<$DELIM"
            echo "$HF_TOKEN"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Upload model/ to the Hub
        # `hf upload` calls create_repo() first, which Trusted Publisher tokens
        # can't do (they only have write access to one existing repo). Call
        # upload_folder() directly to skip the create step.
        # TODO: switch back to `hf upload` once the CLI skips create_repo for
        # hf_jwt_* tokens (see huggingface_hub PR).
        env:
          HF_TOKEN: ${{ steps.hf-auth.outputs.token }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import upload_folder

          upload_folder(
              repo_id="coyotte508/published-from-github",
              folder_path="./model",
              commit_message=f"Publish from {os.environ['GITHUB_SHA'][:7]}",
          )
          PY
